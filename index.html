<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #stage {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      line-height: 1.3;
      color: #888;
      user-select: none;
      white-space: pre;
      letter-spacing: 0;
      display: block;
    }
    #offerings {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 28px;
      margin-top: 1.6em;
      flex-wrap: wrap;
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.35;
      opacity: 0;
      transition: opacity 0.9s ease-out;
    }
    #offerings.visible { opacity: 1; }
    .box {
      white-space: pre;
      cursor: pointer;
      margin: 0;
      color: #555;
      opacity: 0.55;
      transition: color 0.25s, opacity 0.25s;
      user-select: none;
    }
    .box.selected { color: #ccc; opacity: 1; }
    .box:hover { color: #888; opacity: 0.85; }
    .box.selected:hover { color: #ddd; opacity: 1; }

    @media (max-width: 720px) {
      #offerings { flex-direction: column; align-items: center; gap: 12px; font-size: 11px; }
    }
    @media (max-height: 720px) {
      #offerings { font-size: 11px; margin-top: 0.9em; }
    }

    #enter-hint {
      margin-top: 0.7em;
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      color: #444;
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s;
      user-select: none;
    }
    #enter-hint.visible { opacity: 1; }

#contact-screen {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 5;
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      color: #ccc;
      font-size: 13px;
    }
    #contact-screen.active { display: flex; }
    #contact-screen .field { margin-bottom: 18px; }
    #contact-screen label { display: block; font-size: 11px; color: #555; margin-bottom: 4px; }
    #contact-screen input,
    #contact-screen textarea {
      background: transparent; border: none;
      border-bottom: 1px solid #333;
      color: #ccc; font-family: inherit; font-size: 13px;
      padding: 6px 0; width: 320px; outline: none; caret-color: #888;
    }
    #contact-screen textarea {
      resize: none; height: 80px;
      border: 1px solid #333; padding: 6px; margin-top: 4px;
    }
    #contact-screen .actions { display: flex; gap: 24px; margin-top: 12px; }
    #contact-screen button {
      background: none; border: none; font-family: inherit;
      font-size: 12px; color: #555; cursor: pointer; padding: 0;
      transition: color 0.2s;
    }
    #contact-screen button:hover { color: #ccc; }
    #contact-screen .submit { color: #ccc; }
  </style>
</head>
<body>
  <pre id="stage"></pre>
  <div id="offerings"></div>
  <div id="enter-hint"></div>
  <div id="contact-screen"></div>

  <script>
  (() => {
    const COLS = 240;
    const ROWS = 78;   // trimmed — rock ends at row 77
    const CX   = 120;

    const BG = 0, ROCK = 1, BODY = 2, BAND = 3, GALLERY = 4, LANTERN = 5, CAP = 6, WINDOW = 7;

    // Gallery: row 5 = horizontal top rail, rows 6–7 = vertical balusters
    const GAL_FLOOR = '=-========-=======-=======';
    const GAL_RAIL  = '|    |    |    |    |    |';

    const POOLS = [
      /* BG */      '                                             ',
      /* ROCK */    '#@%08BQ&#@+=#@%08B+=-#@%08#@%0#@%#@%08',
      /* BODY */    '|H+=-H|+=H-H|+-=H||H',
      /* BAND */    '  -  =  -  =  -  ',
      /* GALLERY */ GAL_RAIL,
      /* LANTERN */ 'Oo0*+Oo0O*+o',
      /* CAP */     '/\\^/\\^',
      /* WINDOW */  'oO0[]() ',
    ];

    // ── Geometry ──────────────────────────────────────────────────────────────
    // Linear frustum taper: hw 6 at top (row 8) → 16 at base (row 65)
    function bodyHW(row) {
      return 6 + (row - 8) / 57 * 10;
    }

    // Svaberg granite dome — rows 66–77 (12 rows, half the original height)
    function svabergHW(row) {
      const r    = (row - 66) / 11;
      const base = 9 + 85 * Math.sqrt(Math.max(0, r));
      const bump = 4 * Math.sin(row * 1.7) + 3 * Math.cos(row * 2.8 + 1.3);
      return base + bump;
    }

    // Window rows — 3 chars wide (dx <= 1) for visible detail
    const WIN_ROWS = new Set([13, 20, 29, 42, 56]);

    function getZone(row, col) {
      const dx = Math.abs(col - CX);
      if (row === 0 && dx <= 1)                  return CAP;
      if (row >= 1  && row <= 4  && dx <= 6)     return LANTERN;
      if (row >= 5  && row <= 7  && dx <= 9)     return GALLERY;
      if (row >= 8  && row <= 65) {
        const hw = bodyHW(row);
        if (dx > hw) return BG;
        if (WIN_ROWS.has(row) && dx <= 1)         return WINDOW;   // 3-char wide window
        if (row >= 26 && row <= 32)               return BAND;
        return BODY;
      }
      if (row >= 66 && dx <= svabergHW(row))      return ROCK;
      return BG;
    }

    function getPool(zone, row) {
      if (zone === GALLERY) return row === 5 ? GAL_FLOOR : GAL_RAIL;
      return POOLS[zone];
    }

    // ── Cell state ────────────────────────────────────────────────────────────
    const N       = ROWS * COLS;
    const zoneMap = new Uint8Array(N);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        zoneMap[r * COLS + c] = getZone(r, c);

    const cellChar     = new Array(N);
    const cellNextSwap = new Float64Array(N);

    function swapDelay(zone) {
      if (zone === WINDOW) return 2000 + Math.random() * 3000;
      return zone === BG
        ? 500 + Math.random() * 500
        : 150 + Math.random() * 200;
    }

    for (let i = 0; i < N; i++) {
      const r    = Math.floor(i / COLS);
      const pool = getPool(zoneMap[i], r);
      cellChar[i]     = pool[Math.floor(Math.random() * pool.length)];
      cellNextSwap[i] = Math.random() * 300;
    }

    // ── Beam ──────────────────────────────────────────────────────────────────
    const BEAM_PERIOD   = 5000;
    const BEAM_ORIG_ROW = 2;
    const BEAM_ORIG_COL = CX;
    const BEAM_MAX_DIST = 117;

    // Brightness rank — higher = brighter — used to merge overlapping beam effects
    const BRIGHT_RANK = { '#': 8, '@': 7, '*': 6, '+': 5, '=': 4, ':': 3, '-': 2, '.': 1 };
    function brighter(a, b) {
      if (a === undefined) return b;
      if (b === undefined) return a;
      return (BRIGHT_RANK[a] || 0) >= (BRIGHT_RANK[b] || 0) ? a : b;
    }

    function getBeamChar(r, c, angle) {
      const sinA      = Math.sin(angle);
      const cosA      = Math.cos(angle);
      const rowDist   = r - BEAM_ORIG_ROW;
      const colOffset = c - BEAM_ORIG_COL;
      let result;

      // ── Shaft — thicker, with bright core spine + atmospheric halo ─────────
      const shaftVis = Math.max(0, sinA) * (0.4 + 0.6 * Math.abs(cosA));
      if (shaftVis > 0 && colOffset * cosA >= 0) {
        const shaftDist = Math.abs(colOffset);
        if (shaftDist >= 3 && shaftDist <= BEAM_MAX_DIST) {
          const vertHW   = 1.5 + shaftDist * 0.04;
          const aRowDist = Math.abs(rowDist);
          if (aRowDist <= vertHW) {
            const distFade  = Math.pow(1 - shaftDist / BEAM_MAX_DIST, 0.35);
            const vertFade  = 1 - aRowDist / (vertHW + 0.5);
            const coreBoost = aRowDist < 0.5 ? 0.30 * shaftVis
                            : aRowDist < 1.5 ? 0.12 * shaftVis : 0;
            const intensity = distFade * shaftVis * vertFade + coreBoost;
            if      (intensity > 0.80) result = brighter(result, '#');
            else if (intensity > 0.60) result = brighter(result, '+');
            else if (intensity > 0.42) result = brighter(result, '=');
            else if (intensity > 0.26) result = brighter(result, ':');
            else if (intensity > 0.14) result = brighter(result, '-');
            else if (intensity > 0.07) result = brighter(result, '.');
          } else if (aRowDist <= vertHW + 2) {
            // Atmospheric scatter just outside the beam — light bleeding into air
            const scatter = shaftVis * (1 - shaftDist / BEAM_MAX_DIST) * 0.18;
            if (Math.random() < scatter) result = brighter(result, '.');
          }
        }
      }

      // ── Lens flare — vertical bright streak during the swing toward viewer ──
      const lensI = Math.pow(Math.max(0, sinA), 2) * (1 - Math.abs(cosA) * 0.6);
      if (lensI > 0.15 && Math.abs(colOffset) <= 1 && rowDist >= 4 && rowDist <= 28) {
        const vDist   = rowDist - 4;
        const vFade   = Math.exp(-vDist * vDist / 120);
        const colFade = colOffset === 0 ? 1.0 : 0.55;
        const v       = vFade * lensI * colFade;
        if      (v > 0.55) result = brighter(result, '#');
        else if (v > 0.35) result = brighter(result, '+');
        else if (v > 0.22) result = brighter(result, '*');
        else if (v > 0.13) result = brighter(result, '=');
        else if (v > 0.07) result = brighter(result, ':');
        else if (v > 0.03) result = brighter(result, '-');
      }

      // ── Flash — radial burst with hot solid core + wider probabilistic bloom ─
      const flash = Math.pow(Math.max(0, sinA), 4);
      if (flash > 0.02) {
        const dist2 = rowDist * rowDist * 3 + colOffset * colOffset;

        // Hot solid core — deterministic at peak
        const coreR = 9 * flash;
        if (flash > 0.45 && dist2 < coreR * coreR) {
          let coreCh;
          if      (dist2 < 3 && flash > 0.85) coreCh = '#';
          else if (flash > 0.75)              coreCh = '@';
          else if (flash > 0.60)              coreCh = '*';
          else                                coreCh = '+';
          result = brighter(result, coreCh);
        } else {
          // Probabilistic outer bloom
          const tight    = Math.exp(-dist2 / 200) * flash * 0.95;
          const widePeak = Math.exp(-dist2 / 700) * Math.pow(flash, 2) * 0.85;
          if (Math.random() < Math.max(tight, widePeak)) {
            let bloomCh;
            if      (flash > 0.90) bloomCh = '#';
            else if (flash > 0.75) bloomCh = '+';
            else if (flash > 0.55) bloomCh = '*';
            else if (flash > 0.35) bloomCh = '=';
            else                   bloomCh = ':';
            result = brighter(result, bloomCh);
          }
        }
      }

      return result;
    }

    // ── Render loop ───────────────────────────────────────────────────────────
    const stage         = document.getElementById('stage');
    const offeringsEl   = document.getElementById('offerings');
    const hintEl        = document.getElementById('enter-hint');
    const contactScreen = document.getElementById('contact-screen');
    let offeringsShown  = false;

    // Dissolve transition state (shared with openForm/closeForm)
    const TRANS_DURATION = 750;
    let transitionDir   = 0;   // 1 = dissolving in (→ form), -1 = dissolving out (→ lighthouse)
    let transitionStart = 0;

    function render(ts) {
      const angle = (ts % BEAM_PERIOD) / BEAM_PERIOD * 2 * Math.PI;
      // Reveal the offerings and enter hint on the first beam peak (sinA near 1)
      if (!offeringsShown && Math.sin(angle) > 0.88) {
        offeringsEl.classList.add('visible');
        hintEl.textContent = '↵ enter';
        hintEl.classList.add('visible');
        offeringsShown = true;
      }

      // Compute transition brightness once per frame
      let transBright = 0;
      if (transitionDir !== 0) {
        const t = Math.min(1, (ts - transitionStart) / TRANS_DURATION);
        transBright = transitionDir === 1 ? t : 1 - t;
      }

      const lines = [];
      for (let r = 0; r < ROWS; r++) {
        const row = [];
        for (let c = 0; c < COLS; c++) {
          const i    = r * COLS + c;
          const zone = zoneMap[i];
          let ch;

          if (zone === BG) {
            ch = getBeamChar(r, c, angle);
            // Dissolve: override BG cells with bright chars matching the beam flash aesthetic
            if (transBright > 0 && Math.random() < transBright * 0.92) {
              if      (transBright > 0.85) ch = '#';
              else if (transBright > 0.70) ch = '@';
              else if (transBright > 0.55) ch = '*';
              else if (transBright > 0.40) ch = '+';
              else if (transBright > 0.25) ch = '=';
              else                         ch = ':';
            }
          }

          if (ch === undefined) {
            // Group-of-3 flickering: primary cell (c % 3 === 0) owns the timer.
            // When it fires, exactly one random member of the triplet changes.
            if (c % 3 === 0 && ts >= cellNextSwap[i]) {
              const member = Math.floor(Math.random() * 3);  // 0, 1, or 2
              const j      = i + member;
              const pool   = getPool(zoneMap[j], r);
              cellChar[j]  = pool[Math.floor(Math.random() * pool.length)];
              cellNextSwap[i] = ts + swapDelay(zone);  // primary holds the group timer
            }
            ch = cellChar[i];
          }

          row.push(ch);
        }
        lines.push(row.join(''));
      }

      stage.textContent = lines.join('\n');
      requestAnimationFrame(render);
    }

    // ── Sizing ────────────────────────────────────────────────────────────────
    function setSize() {
      const byW = (window.innerWidth  * 0.41) / (COLS * 0.62);
      const byH = (window.innerHeight * 0.34) / (ROWS * 1.3);
      const fs  = Math.max(4, Math.floor(Math.min(byW, byH)));
      stage.style.fontSize = fs + 'px';
    }

    setSize();
    window.addEventListener('resize', setSize);
    document.fonts.ready.then(setSize);
    requestAnimationFrame(render);

    // ── Offerings: three Claude-Code-style boxes ──────────────────────────────
    const OFFERINGS = [
      { id: 'ai',       title: 'AI',       items: ['Agentic workflows', 'LLM pipelines', 'Context architecture', 'Automation', 'AI transformation'] },
      { id: 'capital',  title: 'Capital',  items: ['Fundraising', 'M&A', 'Capital structure', 'SPV', 'Succession'] },
      { id: 'advisory', title: 'Advisory', items: ['PMF', 'HR/Hiring', 'Growth acceleration', 'Capital allocation', 'Value creation'] },
    ];
    const BOX_W = 28;

    function buildBox(o) {
      const titleDashes  = BOX_W - o.title.length - 5;
      const titleLine    = `╭─ ${o.title} ` + '─'.repeat(titleDashes) + '╮';
      const contentLines = o.items.map(item => {
        const pad = ' '.repeat(BOX_W - item.length - 6);
        return `│ • ${item}${pad} │`;
      });
      const bottomLine = '╰' + '─'.repeat(BOX_W - 2) + '╯';
      return [titleLine, ...contentLines, bottomLine].join('\n');
    }

    // ── Form ──────────────────────────────────────────────────────────────────
    contactScreen.innerHTML = `
      <div class="field"><label>Subject</label><input id="f-subject" type="text"></div>
      <div class="field"><label>Company name</label><input id="f-company" type="text"></div>
      <div class="field"><label>Message</label><textarea id="f-message"></textarea></div>
      <div class="actions">
        <button class="submit" id="f-submit">↵ send</button>
        <button id="f-back">← back</button>
      </div>
    `;
    const subjectInput = document.getElementById('f-subject');
    const companyInput = document.getElementById('f-company');
    const msgInput     = document.getElementById('f-message');

    let selectedIdx = 1;
    let formOpen    = false;

    function selectBox(idx) {
      selectedIdx = idx;
      offeringsEl.querySelectorAll('.box').forEach((b, i) =>
        b.classList.toggle('selected', i === idx)
      );
    }

    // Scrambles textContent of an element to/from noise chars matching the beam flash
    function dissolveText(el, dir, duration, offering) {
      const NOISE   = '#@*+=:-';
      const target  = offering ? buildBox(offering) : el.textContent;
      const chars   = [...target];
      const n       = chars.length;
      const triggers = chars.map(ch => ch === '\n' ? -1 : Math.random() * duration * 0.65);
      let t0 = null;
      function tick(ts) {
        if (!t0) t0 = ts;
        const elapsed = ts - t0;
        const result  = chars.map((ch, i) => {
          if (ch === '\n') return '\n';
          const trig = triggers[i];
          if (dir === 'out') {
            if (elapsed < trig) return ch;
            const phase = (elapsed - trig) / (duration * 0.38);
            return phase >= 1 ? ' ' : NOISE[Math.floor(Math.random() * NOISE.length)];
          } else {
            const resolveAt = duration - trig;
            if (elapsed > resolveAt) return ch;
            if (elapsed > resolveAt - duration * 0.38)
              return NOISE[Math.floor(Math.random() * NOISE.length)];
            return ' ';
          }
        });
        el.textContent = result.join('');
        if (elapsed < duration * 1.1) requestAnimationFrame(tick);
        else if (dir === 'in') el.textContent = target;
      }
      requestAnimationFrame(tick);
    }

    function openForm() {
      if (formOpen || transitionDir !== 0) return;
      formOpen = true;
      subjectInput.value = OFFERINGS[selectedIdx].title;
      companyInput.value = '';
      msgInput.value     = '';
      // Dissolve: lighthouse grid brightens, text scrambles out
      transitionDir   = 1;
      transitionStart = performance.now();
      hintEl.style.transition = `opacity ${TRANS_DURATION}ms`;
      hintEl.style.opacity    = '0';
      offeringsEl.querySelectorAll('.box').forEach(box => dissolveText(box, 'out', TRANS_DURATION));
      setTimeout(() => {
        contactScreen.classList.add('active');
        transitionDir = 0;
        companyInput.focus();
      }, TRANS_DURATION);
    }

    function closeForm() {
      if (transitionDir !== 0) return;
      contactScreen.classList.remove('active');
      formOpen = false;
      // Dissolve: lighthouse grid dims back, text crystallises in
      transitionDir   = -1;
      transitionStart = performance.now();
      offeringsEl.querySelectorAll('.box').forEach((box, i) =>
        dissolveText(box, 'in', TRANS_DURATION, OFFERINGS[i])
      );
      setTimeout(() => {
        transitionDir       = 0;
        hintEl.style.opacity = '1';
      }, TRANS_DURATION);
    }

    function submitForm() {
      const subject = encodeURIComponent(subjectInput.value || 'Kaizen enquiry');
      const body    = encodeURIComponent(`Company: ${companyInput.value}\n\n${msgInput.value}`);
      window.location.href = `mailto:nicholas@kaizengrp.co?subject=${subject}&body=${body}`;
      closeForm();
    }

    document.getElementById('f-submit').addEventListener('click', submitForm);
    document.getElementById('f-back').addEventListener('click', closeForm);
    contactScreen.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.activeElement !== msgInput) { e.preventDefault(); submitForm(); }
      if (e.key === 'Escape') closeForm();
    });

    // ── Box click + keyboard nav ───────────────────────────────────────────────
    OFFERINGS.forEach((o, i) => {
      const boxEl       = document.createElement('pre');
      boxEl.className   = 'box' + (o.id === 'capital' ? ' selected' : '');
      boxEl.dataset.id  = o.id;
      boxEl.textContent = buildBox(o);
      boxEl.addEventListener('click', () => {
        if (i === selectedIdx) openForm();
        else selectBox(i);
      });
      offeringsEl.appendChild(boxEl);
    });

    document.addEventListener('keydown', e => {
      if (formOpen) { if (e.key === 'Escape') closeForm(); return; }
      if (!offeringsShown) return;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); selectBox((selectedIdx + 2) % 3); }
      if (e.key === 'ArrowRight') { e.preventDefault(); selectBox((selectedIdx + 1) % 3); }
      if (e.key === 'Enter')      openForm();
    });
  })();
  </script>
</body>
</html>
