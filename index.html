<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAIZEN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      max-width: min(88vw, 900px);
      text-align: center;
    }

    /* Quote — inline spans flow as normal text so line-breaks work naturally */
    #stage {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: clamp(1rem, 1.8vw, 1.35rem);
      letter-spacing: 0.08em;
      line-height: 1.9;
      user-select: none;
    }

    .ch { color: #666; }

    /* KAIZEN — fades in after the scramble; padding-left compensates for
       trailing letter-spacing so the word stays visually centered */
    #brand {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.4em;
      padding-left: 0.4em;
      color: #fff;
      opacity: 0;
      transition: opacity 2s ease;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="stage"></div>
    <div id="brand">KAIZEN</div>
  </div>

  <script>
    // ── Tune these ─────────────────────────────────────────────────────────────
    const TEXT            = '"be the change you want to see in the world"';
    const NOISE_CHARS     = '!<>-_\\/[]{}=+*^?#$%&@';
    const COLOR_NOISE     = '#666';       // scrambling characters
    const COLOR_RESOLVED  = '#fff';       // locked-in characters
    const TOTAL_DURATION  = 3500;         // ms — when the last character locks in
    const REVEAL_START    = 0.15;         // fraction of TOTAL_DURATION when first char resolves
    const JITTER          = 160;          // ms — random ± applied to each character's resolve time
    const BRAND_DELAY     = 500;          // ms after scramble completes before KAIZEN starts fading in
    // ──────────────────────────────────────────────────────────────────────────

    const stage   = document.getElementById('stage');
    const brandEl = document.getElementById('brand');
    const chars   = [...TEXT];
    const n       = chars.length;

    function randChar() {
      return NOISE_CHARS[Math.floor(Math.random() * NOISE_CHARS.length)];
    }

    // Build one inline span per character.
    // Spaces are pre-resolved — they stay as spaces throughout and provide
    // natural line-break opportunities for the surrounding text.
    const spans = chars.map((char) => {
      const s = document.createElement('span');
      s.className = 'ch';
      s.textContent = (char === ' ') ? ' ' : randChar();
      stage.appendChild(s);
      return s;
    });

    // Resolve times spread linearly from REVEAL_START → TOTAL_DURATION,
    // with per-character jitter for an organic feel. Spaces get time 0.
    const resolveStart = TOTAL_DURATION * REVEAL_START;
    const resolveTimes = chars.map((char, i) => {
      if (char === ' ') return 0;
      const frac = i / (n - 1);
      const base = resolveStart + frac * (TOTAL_DURATION - resolveStart);
      return Math.max(50, base + (Math.random() - 0.5) * JITTER);
    });

    // Pre-mark spaces as resolved
    const resolved = chars.map((c) => c === ' ');

    let allResolved = false;
    let startTime   = null;

    function tick(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;

      let stillScrambling = false;

      for (let i = 0; i < n; i++) {
        if (resolved[i]) continue;

        if (elapsed >= resolveTimes[i]) {
          // Lock in the real character
          spans[i].textContent = chars[i];
          spans[i].style.color = COLOR_RESOLVED;
          resolved[i]          = true;
        } else {
          // Keep churning through noise glyphs
          spans[i].textContent = randChar();
          stillScrambling = true;
        }
      }

      if (stillScrambling) {
        requestAnimationFrame(tick);
      } else if (!allResolved) {
        // Last character just locked in — trigger the KAIZEN fade
        allResolved = true;
        setTimeout(() => { brandEl.style.opacity = '1'; }, BRAND_DELAY);
        // rAF loop ends here; CSS transition handles the rest
      }
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
