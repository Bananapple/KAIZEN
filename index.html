<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAIZEN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Single container — font declared once, inherited by all children */
    #stage {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: clamp(2.5rem, 8vw, 6rem);
      letter-spacing: 0.2em;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
    }

    /*
      Fixed width per slot so noise glyphs (which vary slightly in advance width)
      never shift the layout. 1ch = width of one character in a monospace font.
    */
    .ch {
      display: inline-block;
      width: 1ch;
      text-align: center;
    }

    /* Cursor sits flush against the last letter by cancelling its trailing letter-spacing */
    #cursor {
      display: inline-block;
      color: #fff;
      opacity: 0;
      letter-spacing: 0;
      margin-left: -0.15em;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script>
    // ── Tune these ─────────────────────────────────────────────────────────────
    const WORD            = 'KAIZEN';
    const NOISE_CHARS     = '!<>-_\\/[]{}=+*^?#$%&@';
    const COLOR_NOISE     = '#666';       // scrambling characters
    const COLOR_RESOLVED  = '#fff';       // locked-in letters
    const TOTAL_DURATION  = 2200;         // ms — when the last letter locks in
    const STAGGER         = 300;          // ms — gap between consecutive letter resolve times
    const CURSOR_BLINK_MS = 530;          // ms — cursor stays on or off for this long
    // ──────────────────────────────────────────────────────────────────────────

    const stage = document.getElementById('stage');
    const n = WORD.length;

    function randChar() {
      return NOISE_CHARS[Math.floor(Math.random() * NOISE_CHARS.length)];
    }

    // Build one span per letter. Pre-fill with noise so there's no empty-frame flash.
    const spans = WORD.split('').map(() => {
      const s = document.createElement('span');
      s.className = 'ch';
      s.style.color = COLOR_NOISE;
      s.textContent = randChar();
      stage.appendChild(s);
      return s;
    });

    // Cursor — hidden until all letters are locked in
    const cursorEl = document.createElement('span');
    cursorEl.id = 'cursor';
    cursorEl.textContent = '_';
    stage.appendChild(cursorEl);

    /*
      Resolve times: staggered left-to-right so K locks in first, N last.
      A small random jitter per slot makes the cadence feel organic rather
      than mechanical. All times are measured from animation start (ms).

      With defaults: K ~700 ms, N ~2200 ms, with ±60 ms jitter on each.
    */
    const resolveTimes = spans.map((_, i) => {
      const base   = TOTAL_DURATION - (n - 1 - i) * STAGGER;
      const jitter = (Math.random() - 0.5) * STAGGER * 0.4;
      return Math.max(80, base + jitter);
    });

    const resolved   = new Array(n).fill(false);
    let allResolved  = false;
    let startTime    = null;
    let cursorOn     = true;
    let lastBlink    = null;

    function tick(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;

      let stillScrambling = false;

      for (let i = 0; i < n; i++) {
        if (resolved[i]) continue; // already locked — leave it alone

        if (elapsed >= resolveTimes[i]) {
          // Lock in the real letter
          spans[i].textContent = WORD[i];
          spans[i].style.color = COLOR_RESOLVED;
          resolved[i]          = true;
        } else {
          // Keep churning through noise glyphs
          spans[i].textContent = randChar();
          stillScrambling = true;
        }
      }

      // The frame the last letter locks in: reveal the cursor
      if (!allResolved && !stillScrambling) {
        allResolved = true;
        lastBlink   = ts;
        cursorEl.style.opacity = '1';
      }

      // Blink: flip every CURSOR_BLINK_MS
      if (allResolved && ts - lastBlink >= CURSOR_BLINK_MS) {
        cursorOn = !cursorOn;
        cursorEl.style.opacity = cursorOn ? '1' : '0';
        lastBlink = ts;
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
